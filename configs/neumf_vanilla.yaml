# Variant B - **vanilla** NeuMF ablation (no sub-rating attention)
#
# Matches configs/neumf_attn.yaml on every hyperparameter except
#   model.use_attention: false
# so the two runs are directly comparable as vanilla vs enhanced.
#
# Added for the day-10 checkpoint "report both vanilla and enhanced"
# instructor note.

model:
  name: neumf_attn
  gmf_dim: 64
  mlp_dim: 64
  mlp_layers: [256, 128, 64]
  dropout: 0.3
  use_attention: false           # <-- only difference from neumf_attn.yaml

training:
  epochs: 50
  batch_size: 256
  lr: 1.0e-3
  optimizer: adam
  weight_decay: 1.0e-4
  patience: 10

scheduler:
  type: cosine
  min_lr: 1.0e-6

negative_sampling:
  num_negatives: 4

evaluation:
  top_k: [5, 10, 20]
  num_negatives: 99

# Sub-rating columns still listed for documentation, but the model ignores
# them when use_attention is false.
sub_ratings:
  columns: [service, cleanliness, location, value, rooms, sleep_quality]

paths:
  checkpoint_dir: results/neumf_vanilla
  log_dir: logs/neumf_vanilla
