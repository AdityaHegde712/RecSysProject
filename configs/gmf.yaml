# Generalized Matrix Factorization (He et al., 2017)

model:
  name: gmf
  embedding_dim: 64

training:
  epochs: 20
  batch_size: 256
  lr: 1.0e-3
  optimizer: adam
  weight_decay: 0.0

scheduler:
  type: cosine
  min_lr: 1.0e-5

negative_sampling:
  num_negatives: 4         # negatives per positive during training

evaluation:
  top_k: [5, 10, 20]
  metrics: [hr, ndcg]
  num_negatives: 99        # negatives per positive during eval

paths:
  checkpoint_dir: results/gmf
  log_dir: logs/gmf
