# LightGCN — extended-training config.
# Follow-up after the K=1..4 sweep identified K=1 as best (HR@10=0.6865).
# Key differences vs. lightgcn.yaml:
#   - embedding_dim: 128 (up from 64; L=1 was still improving at epoch 30)
#   - epochs: 60 with patience=10 (allow more headroom before plateau)
#   - num_layers: 1 (winner from sweep)
#   - batch_size: 4096 (better GPU throughput at dim=128)

model:
  name: lightgcn
  embedding_dim: 128
  num_layers: 1

training:
  epochs: 60
  batch_size: 4096
  lr: 1.0e-3
  optimizer: adam
  weight_decay: 0.0
  bpr_reg: 1.0e-4
  patience: 10

scheduler:
  type: cosine
  min_lr: 1.0e-5

negative_sampling:
  num_negatives: 1

evaluation:
  top_k: [5, 10, 20]
  metrics: [hr, ndcg]
  num_negatives: 99

paths:
  checkpoint_dir: results/lightgcn
  log_dir: logs/lightgcn
