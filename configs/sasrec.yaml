# SASRec (Kang & McAuley, ICDM 2018) on HotelRec 20-core.
#
# Bakeoff at dim=64 / 8 epochs already reached HR@10 = 0.833 and
# NDCG@10 = 0.781 on test, beating every other model by wide margins.
# This full-scale config bumps capacity + training length and drops
# batch size slightly to reduce variance per step.

model:
  name: sasrec
  embedding_dim: 128
  max_seqlen: 100
  num_heads: 2
  num_layers: 2
  dropout: 0.2

training:
  epochs: 30
  batch_size: 256
  lr: 1.0e-3
  optimizer: adam
  weight_decay: 0.0
  patience: 5

scheduler:
  type: cosine
  min_lr: 1.0e-5

negative_sampling:
  num_negatives: 1

evaluation:
  top_k: [5, 10, 20]
  num_negatives: 99

paths:
  checkpoint_dir: results/sasrec
  log_dir: logs/sasrec
